name: umlips-pipeline
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - numpy>=1.26
  - scipy>=1.12
  - matplotlib>=3.8
  - pyyaml>=6.0
  - pip
  - pip:
      # ASE — Atomic Simulation Environment
      - ase>=3.23
      # PyMatGen — materials analysis
      - pymatgen>=2024.1
      # Jupyter for analysis notebooks
      - jupyter>=1.0
      - ipykernel
      # uMLIP packages (install whichever you need)
      - mace-torch         # MACE-MP-0
      - chgnet             # CHGNet
      - matgl              # M3GNet
      - sevenn             # SevenNet
      # ORB — install from GitHub if not yet on PyPI:
      # - orb-models @ git+https://github.com/orbital-materials/orb-models.git
