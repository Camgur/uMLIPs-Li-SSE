name: umlips-pipeline
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - numpy>=1.26
  - scipy>=1.12
  - matplotlib>=3.8
  - pyyaml>=6.0
  - pip
  - pip:
      # ASE
      - ase>=3.23
      # PyMatGen
      - pymatgen>=2024.1
      # Jupyter for analysis notebooks
      - jupyter>=1.0
      - ipykernel
      # uMLIP packages (install whichever you need)
      - mace-torch         # MACE
      - chgnet             # CHGNet-torch
      - matgl              # CHGNet, M3GNet
      - orb-models         # Orb
