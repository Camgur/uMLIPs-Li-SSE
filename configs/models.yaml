# uMLIP model configurations
# Each entry defines how to load and use a universal MLIP via ASE

models:
  MACE-MP-0:
    package: mace
    calculator: MACECalculator
    kwargs:
      model: "mace-mp-0"
      dispersion: false
      default_dtype: "float64"
      device: "cpu"

  CHGNet:
    package: chgnet
    calculator: CHGNetCalculator
    kwargs:
      use_device: "cpu"

  M3GNet:
    package: matgl
    calculator: PESCalculator
    kwargs:
      potential: "M3GNet-MP-2021.2.8-PES"

  SevenNet:
    package: sevenn
    calculator: SevenNetCalculator
    kwargs:
      model: "7net-0"
      device: "cpu"

  ORB:
    package: orb_models
    calculator: ORBCalculator
    kwargs:
      model: "orb-v2"
      device: "cpu"
